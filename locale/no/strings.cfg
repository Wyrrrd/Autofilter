[mod-description]
Autofilter=Setter automatisk innsetter-filtre basert på nærliggende inventar eller transportbånd.

[mod-setting-name]
autofilter_mode=Automatisk filtermodus

[mod-setting-description]
autofilter_mode=Konfigurer prioriteten for hvilke kilder som leses (contents = inventarinnhold, filter = inventarfilter, belt = innhold på transportbånd, check = sjekk om innsetting er mulig på slipp-posisjonen).

[tips-and-tricks-item-name]
autofilter=Autofilter

[tips-and-tricks-item-description]
autofilter=Når du manuelt plasserer en [entity=inserter] (og hvis automatiske filtre er aktivert i innstillingene), leser den inventarinnhold, inventarfiltre eller innhold på transportbånd på opptakssiden og setter filteret sitt til disse gjenstandene.\n\nDet finnes bare ett tekstfelt for å konfigurere denne oppførselen. Dette kan gjøres når som helst mens du spiller. Du kan legge inn hvert av følgende nøkkelord i tekstfeltet, i hvilken som helst rekkefølge, adskilt med mellomrom. De behandles fra venstre mot høyre.\n\n - contents : Ser etter filterkandidater i inventarinnholdet ved opptaksposisjonen til [entity=inserter].\n - filter : Ser etter filterkandidater i inventarets filterinnstillinger ved opptaksposisjonen til [entity=inserter].\n - belt : Ser etter filterkandidater i gjenstandene på et [entity=transport-belt] eller [entity=splitter] ved opptaksposisjonen til [entity=inserter].\n - check : Sjekker de nåværende filterkandidatene for om de kan settes inn i inventaret ved slipp-posisjonen til [entity=inserter], og fjerner dem fra kandidatlisten hvis det ikke lykkes.\n - Alt annet ignoreres. Hvis du vil deaktivere all funksjonalitet i Autofilter, kan du bare skrive "any" i tekstfeltet.\n\nEtter at disse er behandlet, fjernes duplikater slik at bare den første forekomsten av hver gjenstand blir igjen i kandidatlisten. Deretter skrives kandidatene til filteret på [entity=inserter] til det er fullt.

[shortcut-name]
autofilter=Autofilter